{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">

    <div>

        <h2 class="fw-bold">

            <i class="bi bi-people-fill text-info"></i>
            Gestión de Pacientes

        </h2>

        <p class="text-secondary mb-0">
            Administración de pacientes registrados
        </p>

    </div>

    <a href="{{ url_for('pacientes.create') }}"
       class="btn btn-info text-dark">

        <i class="bi bi-person-plus-fill"></i>
        Nuevo Paciente

    </a>

</div>


<div class="card shadow border-0">

    <div class="card-body">

        <div class="table-responsive">

            <table class="table align-middle custom-table">

                <thead>

                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Teléfono</th>
                        <th class="text-center">Acciones</th>
                    </tr>

                </thead>

                <tbody>

                    {% for paciente in pacientes %}

                    <tr>

                        <td>{{ paciente.id }}</td>

                        <td>

                            <strong>
                                {{ paciente.nombre }}
                            </strong>

                        </td>

                        <td>
                            {{ paciente.telefono }}
                        </td>

                        <td class="text-center">

                            <a href="{{ url_for('pacientes.edit', id=paciente.id) }}"
                               class="btn btn-warning btn-sm">

                                <i class="bi bi-pencil-square"></i>

                            </a>

                            <a href="{{ url_for('pacientes.delete', id=paciente.id) }}"
                               onclick="return confirm('¿Estás seguro de eliminar este paciente?')"
                               class="btn btn-danger btn-sm">

                                <i class="bi bi-trash"></i>

                            </a>

                        </td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

<style>

    .custom-table{
        color: #e2e8f0;
        margin-bottom: 0;
    }

    .custom-table thead th{
        background-color: #0f172a;
        color: #94a3b8;
        border-bottom: 1px solid #334155;
        padding: 15px;
    }

    .custom-table tbody tr{
        background-color: #111827;
        border-bottom: 1px solid #1e293b;
    }

    .custom-table tbody tr:hover{
        background-color: #1e293b;
    }

    .custom-table td{
        background-color: #111827;
        color: #cbd5e1;
        padding: 15px;
        border-bottom: none;
    }

</style>

{% endblock %}
