{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-6">

        <div class="card shadow-lg border-0">

            <div class="card-body p-4 text-white">

                <h3 class="fw-bold mb-4 text-white">

                    <i class="bi bi-pencil-square text-warning"></i>
                    Editar Médico

                </h3>

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label text-white">
                            Nombre Completo
                        </label>

                        <input
                            type="text"
                            name="nombre"
                            class="form-control"
                            value="{{ medico.nombre }}"
                            required
                        >

                    </div>

                    <div class="mb-4">

                        <label class="form-label text-white">
                            Especialidad
                        </label>

                        <input
                            type="text"
                            name="especialidad"
                            class="form-control"
                            value="{{ medico.especialidad }}"
                            required
                        >

                    </div>

                    <div class="d-flex gap-2">

                        <button
                            type="submit"
                            class="btn btn-warning">

                            <i class="bi bi-check-circle"></i>
                            Actualizar

                        </button>

                        <a href="{{ url_for('medicos.index') }}"
                           class="btn btn-secondary">

                            Cancelar

                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
