{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">

    <div>

        <h2 class="fw-bold text-light">

            <i class="bi bi-calendar2-check-fill text-success"></i>
            Gestión de Citas

        </h2>

        <p style="color:#94a3b8;" class="mb-0">
            Administración de citas médicas
        </p>

    </div>

    <a href="{{ url_for('citas.create') }}"
       class="btn btn-success">

        <i class="bi bi-plus-circle"></i>
        Nueva Cita

    </a>

</div>


<div class="card shadow border-0">

    <div class="card-body p-3">

        <div class="table-responsive">

            <table class="table align-middle custom-table w-100">

                <thead>

                    <tr>
                        <th>ID</th>
                        <th>Fecha</th>
                        <th>Hora</th>
                        <th>Médico</th>
                        <th>Paciente</th>
                        <th class="text-center">Acciones</th>
                    </tr>

                </thead>

                <tbody>

                    {% for cita in citas %}

                    <tr>

                        <td>{{ cita.id }}</td>

                        <td>{{ cita.fecha }}</td>

                        <td>{{ cita.hora }}</td>

                        <td>

                            <span class="medico-badge">
                                {{ cita.medico.nombre }}
                            </span>

                        </td>

                        <td>

                            <span class="paciente-badge">
                                {{ cita.paciente.nombre }}
                            </span>

                        </td>

                        <td class="text-center">

                            <a href="{{ url_for('citas.edit', id=cita.id) }}"
                               class="btn btn-warning btn-sm">

                                <i class="bi bi-pencil-square"></i>

                            </a>

                            <a href="{{ url_for('citas.delete', id=cita.id) }}"
                               onclick="return confirm('¿Estás seguro de eliminar esta cita?')"
                               class="btn btn-danger btn-sm">

                                <i class="bi bi-trash"></i>

                            </a>

                        </td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>


<style>

    .custom-table{
        color: #e2e8f0;
        margin-bottom: 0;
        min-width: 1100px;
    }

    .custom-table thead th{
        background-color: #0f172a;
        color: #94a3b8;
        border-bottom: 1px solid #334155;
        padding: 18px;
        font-size: 1rem;
    }

    .custom-table tbody tr{
        background-color: #111827;
        border-bottom: 1px solid #1e293b;
        transition: .2s ease;
    }

    .custom-table tbody tr:hover{
        background-color: #1e293b;
    }

    .custom-table td{
        background-color: #111827;
        color: #cbd5e1;
        padding: 18px;
        border-bottom: none;
        vertical-align: middle;
        font-size: 1rem;
    }

    .medico-badge{
        background: rgba(59,130,246,0.15);
        color: #60a5fa;
        padding: 5px 10px;
        border-radius: 999px;
        font-weight: 500;
        font-size: .85rem;
    }

    .paciente-badge{
        background: rgba(16,185,129,0.15);
        color: #34d399;
        padding: 5px 10px;
        border-radius: 999px;
        font-weight: 500;
        font-size: .85rem;
    }

</style>

{% endblock %}
